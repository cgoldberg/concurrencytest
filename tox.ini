# Tox (http://tox.testrun.org/) is a tool for running tests
# in multiple virtualenvs. This configuration file will run the
# test suite on all supported python versions. To use it, "pip install tox"
# and then run "tox" from this directory.
#
# For a specific environment, run: "tox -e <env>" (i.e.: "tox -e py314")
#
# This tox configuration will skip any Python interpreters that can't be found.
# To manage multiple Python interpreters for covering all versions,
# use pyenv: https://github.com/pyenv/pyenv

[tox]
env_list =
    validate
    lint
    type
    py310
    py311
    py312
    py313
    py314
    pypy3
skip_missing_interpreters = true

[testenv]
description = run unit tests
platform = linux|darwin|.*bsd.*
commands =
    {envpython} test_concurrencytest.py

[testenv:validate]
description = validate project configuration
platform = .*
dependency_groups =
    validate
commands =
    validate-pyproject pyproject.toml
    {envpython} -c "import concurrencytest"

[testenv:lint]
description = run linter and formatter
platform = .*
dependency_groups =
    lint
skip_install = true
commands =
    # crazy workaround so black doesn't print red messages to console on success
    {envpython} -c "import subprocess as s; import sys; "\
    "r = s.run(['black', '.'], capture_output=True, text=True, encoding='utf-8'); "\
    "sys.stdout.write(r.stderr) if not r.returncode else sys.stderr.write(r.stderr)"
    ruff check --fix --show-fixes --exit-non-zero-on-fix .
    ruff format --exit-non-zero-on-format .
    refurb concurrencytest.py test_concurrencytest.py

[testenv:type]
description = run type checking
platform = .*
dependency_groups =
    type
commands =
    mypy --install-types --non-interactive {posargs:.}
